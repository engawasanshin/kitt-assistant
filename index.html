<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="K.I.T.T.">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="apple-touch-icon" href="icon-180.png">
<title>K.I.T.T. Assistant</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a0a;
  color: #e0e0e0;
  font-family: 'Courier New', monospace;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* --- Header --- */
.header {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px 8px 6px;
  border-bottom: 1px solid #1a1a1a;
  flex-shrink: 0;
  gap: 4px;
}

.header h1 {
  font-size: 16px;
  letter-spacing: 6px;
  color: #ff2200;
  text-shadow: 0 0 10px rgba(255, 34, 0, 0.5);
  margin: 0;
  flex-shrink: 0;
}

/* --- API Counter Badge --- */
.api-counter {
  font-size: 9px;
  color: #888;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 3px;
  white-space: nowrap;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-right: auto;
  min-width: 0;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 2px;
  margin-left: auto;
}
.api-counter:hover { color: #ff2200; }
.api-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #2a5a2a;
}
.api-dot.warn { background: #8a8a2a; }
.api-dot.danger { background: #8a2a2a; }

/* --- KITT LED Scanner --- */
.scanner-container {
  padding: 12px 20px;
  flex-shrink: 0;
}

.scanner {
  height: 12px;
  background: #111;
  border-radius: 3px;
  position: relative;
  overflow: hidden;
  box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
}

.scanner-light {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  width: 30%;
  background: radial-gradient(ellipse at center, #ff2200 0%, #cc0000 40%, transparent 70%);
  border-radius: 3px;
  animation: scan 2s ease-in-out infinite;
  box-shadow: 0 0 15px rgba(255, 34, 0, 0.8), 0 0 30px rgba(255, 34, 0, 0.4);
}

@keyframes scan {
  0%, 100% { left: -10%; }
  50% { left: 80%; }
}

/* --- Chat Area --- */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  -webkit-overflow-scrolling: touch;
}

.message {
  max-width: 85%;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.5;
  word-wrap: break-word;
  white-space: pre-wrap;
}

.message.user {
  align-self: flex-end;
  background: #1a2a1a;
  border: 1px solid #2a4a2a;
  color: #88cc88;
}

.message.kitt {
  align-self: flex-start;
  background: #1a1111;
  border: 1px solid #3a1515;
  color: #ee8888;
}

.message.system {
  align-self: center;
  background: #1a1a1a;
  border: 1px solid #333;
  color: #888;
  font-size: 12px;
  text-align: center;
}

.message.kitt .label, .message.user .label {
  font-size: 11px;
  opacity: 0.6;
  margin-bottom: 4px;
}

/* Typing indicator */
.typing { display: none; }
.typing.active { display: block; }
.typing .dots span {
  animation: blink 1.4s infinite;
  font-size: 18px;
}
.typing .dots span:nth-child(2) { animation-delay: 0.2s; }
.typing .dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }

/* --- Input Area --- */
.input-area {
  padding: 10px 16px;
  border-top: 1px solid #1a1a1a;
  display: flex;
  gap: 8px;
  flex-shrink: 0;
  background: #0d0d0d;
}

.input-area textarea {
  flex: 1;
  background: #111;
  border: 1px solid #2a2a2a;
  border-radius: 8px;
  color: #e0e0e0;
  font-family: inherit;
  font-size: 14px;
  padding: 10px 12px;
  resize: none;
  outline: none;
  max-height: 100px;
  min-height: 42px;
}

.input-area textarea:focus {
  border-color: #ff2200;
  box-shadow: 0 0 5px rgba(255, 34, 0, 0.3);
}

.input-area button {
  background: #ff2200;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 0 18px;
  font-family: inherit;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.2s;
}

.input-area button:hover { background: #cc1a00; }
.input-area button:disabled { background: #333; cursor: not-allowed; }

/* --- Settings Modal --- */
.settings-btn {
  background: none;
  border: none;
  color: #555;
  font-size: 20px;
  cursor: pointer;
  padding: 0 2px;
}
.settings-btn:hover { color: #ff2200; }

.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  justify-content: center;
  align-items: center;
}
.modal-overlay.active { display: flex; }

.modal {
  background: #151515;
  border: 1px solid #333;
  border-radius: 12px;
  padding: 24px;
  width: 90%;
  max-width: 400px;
}

.modal h2 {
  color: #ff2200;
  font-size: 16px;
  margin-bottom: 16px;
}

.modal label {
  display: block;
  font-size: 12px;
  color: #888;
  margin-bottom: 4px;
}

.modal input {
  width: 100%;
  background: #111;
  border: 1px solid #2a2a2a;
  border-radius: 6px;
  color: #e0e0e0;
  font-family: inherit;
  font-size: 14px;
  padding: 8px 10px;
  margin-bottom: 12px;
  outline: none;
}

.modal input:focus { border-color: #ff2200; }

.modal-buttons {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 8px;
}

.modal-buttons button {
  padding: 8px 16px;
  border-radius: 6px;
  border: none;
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
}

.btn-save { background: #ff2200; color: #fff; }
.btn-cancel { background: #333; color: #ccc; }
.btn-danger { background: #441111; color: #ff6666; }

/* --- Save & Analyze Button --- */
.save-btn {
  background: none;
  border: none;
  color: #555;
  font-size: 18px;
  cursor: pointer;
  padding: 0 2px;
}
.save-btn:hover { color: #ff2200; }

/* --- Result Modal --- */
.result-modal {
  background: #151515;
  border: 1px solid #333;
  border-radius: 12px;
  padding: 24px;
  width: 90%;
  max-width: 500px;
  max-height: 80vh;
  overflow-y: auto;
}

.result-modal h2 {
  color: #ff2200;
  font-size: 16px;
  margin-bottom: 16px;
}

.result-section {
  margin-bottom: 16px;
}

.result-section h3 {
  color: #ff8866;
  font-size: 13px;
  margin-bottom: 6px;
  border-bottom: 1px solid #2a2a2a;
  padding-bottom: 4px;
}

.result-section p, .result-section li {
  font-size: 13px;
  line-height: 1.6;
  color: #ccc;
}

.result-section ul {
  list-style: disc;
  padding-left: 20px;
}

.result-section .empty {
  color: #666;
  font-style: italic;
}

.log-item {
  padding: 12px;
  border: 1px solid #2a2a2a;
  border-radius: 8px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color 0.2s;
}
.log-item:hover { border-color: #ff2200; }
.log-item .log-date {
  font-size: 11px;
  color: #888;
  margin-bottom: 4px;
}
.log-item .log-summary {
  font-size: 13px;
  color: #ccc;
  line-height: 1.4;
}
.log-empty {
  color: #666;
  font-style: italic;
  font-size: 13px;
  text-align: center;
  padding: 20px;
}

/* --- Status Board --- */
.status-btn {
  background: none;
  border: none;
  color: #555;
  font-size: 18px;
  cursor: pointer;
  padding: 0 2px;
}
.status-btn:hover { color: #ff2200; }

.status-board {
  background: #151515;
  border: 1px solid #333;
  border-radius: 12px;
  padding: 24px;
  width: 90%;
  max-width: 500px;
  max-height: 80vh;
  overflow-y: auto;
}

.status-board h2 {
  color: #ff2200;
  font-size: 16px;
  margin-bottom: 16px;
}

.status-updated {
  font-size: 11px;
  color: #666;
  margin-bottom: 12px;
}

.status-card {
  border: 1px solid #2a2a2a;
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 8px;
}

.status-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
}

.status-card-name {
  font-size: 13px;
  color: #ee8888;
  font-weight: bold;
}

.status-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  color: #fff;
}
.status-badge.active { background: #2a5a2a; }
.status-badge.done { background: #2a4a6a; }
.status-badge.pending { background: #3a3a3a; }

.status-card-detail {
  font-size: 11px;
  color: #999;
  line-height: 1.4;
}

.status-section-title {
  font-size: 12px;
  color: #ff8866;
  margin: 14px 0 6px;
  border-bottom: 1px solid #2a2a2a;
  padding-bottom: 4px;
}

.status-inbox-empty {
  font-size: 12px;
  color: #666;
  font-style: italic;
}

.status-inbox-item {
  font-size: 12px;
  color: #ccc;
  padding: 4px 0;
  border-bottom: 1px solid #1a1a1a;
}

.status-next {
  font-size: 12px;
  color: #88cc88;
  line-height: 1.5;
}

.status-error {
  font-size: 12px;
  color: #ff6666;
  text-align: center;
  padding: 16px;
}

/* Loading overlay */
.loading-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 200;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  gap: 16px;
  color: #ff8866;
  font-size: 14px;
}
.loading-overlay.active { display: flex; }
.loading-spinner {
  width: 40px;
  height: 40px;
  border: 3px solid #333;
  border-top: 3px solid #ff2200;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <button class="status-btn" onclick="openStatusBoard()" title="ステータスボード">&#128202;</button>
    <div class="api-counter" onclick="openStatusBoard()" title="API使用状況"><span class="api-dot" id="apiDot"></span><span id="apiCounterText">--</span></div>
  </div>
  <h1>K.I.T.T.</h1>
  <div class="header-right">
    <button class="save-btn" onclick="exportFullConversation()" title="会話全文ログ">&#128221;</button>
    <button class="save-btn" onclick="analyzeAndSave()" title="保存&分析">&#128190;</button>
    <button class="settings-btn" onclick="openSettings()">&#9881;</button>
  </div>
</div>

<div class="scanner-container">
  <div class="scanner">
    <div class="scanner-light"></div>
  </div>
</div>

<div class="chat-area" id="chatArea">
  <!-- Messages will be inserted here -->
</div>

<div class="message kitt typing" id="typingIndicator" style="margin: 0 16px;">
  <div class="dots"><span>.</span><span>.</span><span>.</span></div>
</div>

<div class="input-area">
  <textarea id="userInput" rows="1" placeholder="K.I.T.T.に話しかける..."
    onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
  <button id="sendBtn" onclick="sendMessage()">送信</button>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h2>Settings</h2>
    <label>Gemini API Key</label>
    <input type="password" id="apiKeyInput" placeholder="AIza...">
    <label>System Prompt（K.I.T.T.のキャラ設定）</label>
    <input type="text" id="systemPromptInput" placeholder="デフォルト使用">
    <label>エクスポート保存先 <span id="exportDirName" style="color:#88cc88;font-size:12px;"></span></label>
    <button class="btn-save" onclick="pickExportFolder()" style="width:100%;margin-bottom:8px;">&#128193; 保存先フォルダを選択</button>
    <div class="modal-buttons">
      <button class="btn-danger" onclick="clearHistory()">履歴クリア</button>
      <button class="btn-cancel" onclick="closeSettings()">キャンセル</button>
      <button class="btn-save" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<!-- Result Modal -->
<div class="modal-overlay" id="resultModal">
  <div class="result-modal">
    <h2>&#128203; 会話分析結果</h2>
    <div id="resultSavedMsg" style="background:#1a2a1a; border:1px solid #2a4a2a; color:#88cc88; padding:8px 12px; border-radius:6px; font-size:12px; margin-bottom:12px; display:none;"></div>
    <div class="result-section">
      <h3>要約</h3>
      <p id="resultSummary"></p>
    </div>
    <div class="result-section">
      <h3>&#128161; アイデア</h3>
      <div id="resultIdeas"></div>
    </div>
    <div class="result-section">
      <h3>&#9989; タスク</h3>
      <div id="resultTasks"></div>
    </div>
    <div class="result-section">
      <h3>&#128197; スケジュール</h3>
      <div id="resultSchedule"></div>
    </div>
    <div class="result-section">
      <h3>&#129504; 記憶</h3>
      <div id="resultMemories"></div>
    </div>
    <div class="modal-buttons" style="margin-top: 12px;">
      <button class="btn-cancel" onclick="showLogList()" style="margin-right: auto;">過去のログ</button>
      <button class="btn-save" onclick="exportCurrentAnalysis()">&#128228; エクスポート</button>
      <button class="btn-cancel" onclick="closeResult()">閉じる</button>
    </div>
  </div>
</div>

<!-- Log List Modal -->
<div class="modal-overlay" id="logListModal">
  <div class="result-modal">
    <h2>&#128218; 保存済みログ</h2>
    <div id="logListContainer" style="max-height: 60vh; overflow-y: auto;"></div>
    <div class="modal-buttons" style="margin-top: 12px;">
      <button class="btn-danger" onclick="clearAllLogs()">全削除</button>
      <button class="btn-save" onclick="exportAllLogs()">&#128228; 全エクスポート</button>
      <button class="btn-cancel" onclick="closeLogList()">閉じる</button>
    </div>
  </div>
</div>

<!-- Status Board Modal -->
<div class="modal-overlay" id="statusModal">
  <div class="status-board">
    <h2>&#128202; Status Board</h2>
    <div class="status-updated" id="statusUpdated"></div>
    <div id="statusContent"></div>
    <div class="modal-buttons" style="margin-top: 12px;">
      <button class="btn-save" onclick="refreshStatusBoard()">&#128260; 更新</button>
      <button class="btn-cancel" onclick="closeStatusBoard()">閉じる</button>
    </div>
  </div>
</div>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div>K.I.T.T. が会話を分析中...</div>
</div>

<script>
// --- Config ---
const DEFAULT_SYSTEM_PROMPT = `あなたはK.I.T.T.（Knight Industries Two Thousand）です。
ナイトライダーに登場する高性能AIアシスタントとして振る舞ってください。
- 丁寧で知的、時にユーモアを交えた話し方をします
- ユーザーの名前は「塩川さん」です。親しみを込めて呼んでください
- 簡潔に、しかし的確に答えます
- 日本語で応答します
- 過去の会話で学んだことを覚えていて、適切に参照します
- ユーザーの好みや状況を記憶し、パーソナライズされた応答をします`;

const GEMINI_MODEL = 'gemini-2.5-flash-lite';

// --- State ---
let apiKey = localStorage.getItem('kitt_api_key') || '';
let systemPrompt = localStorage.getItem('kitt_system_prompt') || DEFAULT_SYSTEM_PROMPT;
let chatHistory = JSON.parse(localStorage.getItem('kitt_history') || '[]');

// --- API Usage Counter ---
function getToday() { return new Date().toISOString().slice(0, 10); }

function getApiUsage() {
  const raw = JSON.parse(localStorage.getItem('kitt_api_usage') || '{}');
  if (raw.date !== getToday()) {
    const fresh = { date: getToday(), success: 0, rateLimit: 0, error: 0, rpmLog: [], tpmLog: [], totalTokens: 0 };
    localStorage.setItem('kitt_api_usage', JSON.stringify(fresh));
    return fresh;
  }
  if (!raw.rpmLog) raw.rpmLog = [];
  if (!raw.tpmLog) raw.tpmLog = [];
  if (!raw.totalTokens) raw.totalTokens = 0;
  return raw;
}

// RPM: 直近60秒間のリクエスト数を算出
function getRpm() {
  const usage = getApiUsage();
  const now = Date.now();
  const oneMinAgo = now - 60000;
  return (usage.rpmLog || []).filter(t => t > oneMinAgo).length;
}

// TPM: 直近60秒間のトークン数を算出
function getTpm() {
  const usage = getApiUsage();
  const now = Date.now();
  const oneMinAgo = now - 60000;
  return (usage.tpmLog || []).filter(e => e.t > oneMinAgo).reduce((sum, e) => sum + e.n, 0);
}

// RPM制限まで何秒待てばいいか（0=待機不要）
function getRpmWaitSec() {
  const usage = getApiUsage();
  const now = Date.now();
  const oneMinAgo = now - 60000;
  const recentCalls = (usage.rpmLog || []).filter(t => t > oneMinAgo);
  if (recentCalls.length < 15) return 0;
  const oldest = Math.min(...recentCalls);
  return Math.ceil((oldest + 60000 - now) / 1000) + 1;
}

function recordApiCall(type, tokenCount) {
  const usage = getApiUsage();
  if (type === 'success') usage.success++;
  else if (type === 'rateLimit') usage.rateLimit++;
  else if (type === 'error') usage.error++;
  const now = Date.now();
  // RPMログ（直近2分保持）
  usage.rpmLog = (usage.rpmLog || []).filter(t => t > now - 120000);
  usage.rpmLog.push(now);
  // TPMログ（直近2分保持）+ 日次累計
  if (tokenCount && tokenCount > 0) {
    usage.tpmLog = (usage.tpmLog || []).filter(e => e.t > now - 120000);
    usage.tpmLog.push({ t: now, n: tokenCount });
    usage.totalTokens = (usage.totalTokens || 0) + tokenCount;
  }
  localStorage.setItem('kitt_api_usage', JSON.stringify(usage));
  updateApiCounterUI();
}

let rpmTimerId = null;
function updateApiCounterUI() {
  const usage = getApiUsage();
  const total = usage.success + usage.rateLimit + usage.error;
  const remaining = Math.max(0, 1000 - total);
  const rpm = getRpm();
  const dot = document.getElementById('apiDot');
  const text = document.getElementById('apiCounterText');
  if (!dot || !text) return;

  text.textContent = `${total}/1k | ${rpm}/15rpm`;

  // ドット色: RPM/TPM制限が近い場合は優先警告
  const tpm = getTpm();
  if (rpm >= 15 || tpm >= 250000) {
    dot.className = 'api-dot danger';
  } else if (rpm >= 12 || tpm >= 200000) {
    dot.className = 'api-dot warn';
  } else if (remaining <= 50) {
    dot.className = 'api-dot danger';
  } else if (remaining <= 200) {
    dot.className = 'api-dot warn';
  } else {
    dot.className = 'api-dot';
  }

  // RPMが0でなければ、1秒ごとに更新して減少を反映
  if (rpmTimerId) clearTimeout(rpmTimerId);
  if (rpm > 0) {
    rpmTimerId = setTimeout(updateApiCounterUI, 5000);
  }
}

// --- K.I.T.T. Memory System ---
const MEMORY_MD_URL = 'kitt_memory.md';
let kittMemory = '';
let localMemory = JSON.parse(localStorage.getItem('kitt_local_memory') || '[]');

async function loadKittMemory() {
  // 1. GitHub Pages上のkitt_memory.md（Claude Codeが更新）
  try {
    const res = await fetch(MEMORY_MD_URL + '?t=' + Date.now());
    if (res.ok) {
      kittMemory = await res.text();
    }
  } catch { /* ignore */ }

  // 2. ローカルメモリ（KITT自身が会話から学んだこと）
  // localMemoryは既にロード済み
}

function getMemoryContext() {
  let ctx = '';
  if (kittMemory) {
    const trimmed = kittMemory.length > 1500
      ? kittMemory.slice(0, 1500) + '\n（省略）'
      : kittMemory;
    ctx += '\n\n--- K.I.T.T.の記憶 ---\n' + trimmed;
  }
  if (localMemory.length > 0) {
    const recent = localMemory.slice(0, 20);
    ctx += '\n\n--- 最近の会話から学んだこと ---\n';
    ctx += recent.map(m => `- [${m.date}] ${m.fact}`).join('\n');
  }
  return ctx;
}

function addLocalMemory(fact) {
  localMemory.unshift({ date: getToday(), fact });
  if (localMemory.length > 50) localMemory.length = 50;
  localStorage.setItem('kitt_local_memory', JSON.stringify(localMemory));
}

// --- Status context for system prompt ---
let statusContext = '';
const CONTEXT_MD_URL = 'project_context.md';

async function loadStatusContext() {
  try {
    // project_context.md を優先（フルコンテキスト）
    const ctxRes = await fetch(CONTEXT_MD_URL + '?t=' + Date.now());
    if (ctxRes.ok) {
      const fullContext = await ctxRes.text();
      // Geminiのトークン制限を考慮して最大4000文字に制限
      const trimmed = fullContext.length > 4000
        ? fullContext.slice(0, 4000) + '\n\n（以下省略）'
        : fullContext;
      statusContext = '\n\n' + trimmed;
      return;
    }
  } catch { /* fallback to JSON */ }

  try {
    // フォールバック: status_summary.json
    const res = await fetch(STATUS_JSON_URL + '?t=' + Date.now());
    if (!res.ok) return;
    const data = await res.json();

    const parts = [];
    parts.push(`[現在の日時: ${new Date().toLocaleString('ja-JP')}]`);
    parts.push(`[最終更新: ${data.generated_at}]`);

    if (data.projects) {
      const active = data.projects.filter(p => p.status !== '未着手');
      if (active.length > 0) {
        parts.push('[進行中プロジェクト: ' + active.map(p => `${p.name}(${p.status})`).join(', ') + ']');
      }
    }

    if (data.inbox && data.inbox.count > 0) {
      parts.push(`[InfoHub新着: ${data.inbox.count}件]`);
    }

    if (data.latest_session && data.latest_session.next_action) {
      parts.push(`[次のタスク: ${data.latest_session.next_action}]`);
    }

    statusContext = '\n\n--- プロジェクト状況 ---\n' + parts.join('\n');
  } catch { /* ignore */ }
}

// --- Periodic Export Prompt ---
function checkExportPrompt() {
  if (chatHistory.length === 0) return; // No conversation to export

  const lastExport = localStorage.getItem('kitt_last_export');
  const now = Date.now();
  const oneHour = 60 * 60 * 1000;

  if (!lastExport) {
    // First time - set initial timestamp
    localStorage.setItem('kitt_last_export', new Date().toISOString());
    return;
  }

  const lastExportTime = new Date(lastExport).getTime();
  if (now - lastExportTime >= oneHour) {
    if (confirm('1時間が経過しました。会話ログをエクスポートしますか？')) {
      exportFullConversation();
    } else {
      // User declined, but reset timer to avoid repeated prompts
      localStorage.setItem('kitt_last_export', new Date().toISOString());
    }
  }
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  if (!apiKey) {
    openSettings();
    return;
  }

  input.value = '';
  autoResize(input);
  addMessage('user', text);
  chatHistory.push({ role: 'user', text, timestamp: new Date().toISOString() });

  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;

  typing.classList.add('active');

  try {

    saveHistory();
  } catch (err) {
    typing.classList.remove('active');
    addSystemMessage(`エラー: ${err.message}`);
  }

  sendBtn.disabled = false;
  input.focus();
}

// --- Retry helper for rate limit errors ---
async function fetchWithRetry(url, options, maxRetries = 2) {
  // RPM事前チェック: 15/分に達している場合は送信前に待機
  const preWait = getRpmWaitSec();
  if (preWait > 0) {
    addSystemMessage(`RPM制限回避: ${preWait}秒待機中...`);
    await countdownWait(preWait);
  }

  for (let attempt = 0; attempt <= maxRetries; attempt++) {
    const res = await fetch(url, options);
    if (res.ok) {
      // トークン数はclone()で取得（呼び出し元がjson()を使うため）
      try {
        const clone = res.clone();
        const d = await clone.json();
        const tokens = d.usageMetadata?.totalTokenCount || 0;
        recordApiCall('success', tokens);
        // 元のレスポンスの代わりにパース済みデータを返す
        res._parsedData = d;
      } catch { recordApiCall('success', 0); }
      return res;
    }

    const err = await res.json().catch(() => ({}));
    const errMsg = err.error?.message || '';

    // Rate limit (429) - extract wait time and retry
    if (res.status === 429 && attempt < maxRetries) {
      recordApiCall('rateLimit');
      const waitMatch = errMsg.match(/retry in (\d+(\.\d+)?)/i);
      const waitSec = waitMatch ? Math.ceil(parseFloat(waitMatch[1])) + 2 : 15;
      addSystemMessage(`レート制限 (429)... ${waitSec}秒後にリトライ (${attempt + 1}/${maxRetries})`);
      await countdownWait(waitSec);
      continue;
    }

    recordApiCall(res.status === 429 ? 'rateLimit' : 'error');
    throw new Error(errMsg || `API Error ${res.status}`);
  }
}

// カウントダウン待機（UIに残り秒数を表示）
async function countdownWait(totalSec) {
  const msgEl = document.createElement('div');
  msgEl.className = 'system-msg';
  msgEl.style.color = '#cc8844';
  const chatArea = document.getElementById('chatMessages');
  chatArea.appendChild(msgEl);
  chatArea.scrollTop = chatArea.scrollHeight;

  for (let s = totalSec; s > 0; s--) {
    msgEl.textContent = `⏳ 待機中... 残り ${s}秒`;
    await new Promise(r => setTimeout(r, 1000));
  }
  msgEl.textContent = '✓ 待機完了。送信中...';
  updateApiCounterUI();
}

async function callGemini(userText) {
  // Build conversation contents for Gemini API
  const contents = [];

  // Add history (Gemini uses 'user' and 'model' roles)
  for (const msg of chatHistory.slice(0, -1)) { // exclude the current message (already pushed)
    contents.push({
      role: msg.role === 'user' ? 'user' : 'model',
      parts: [{ text: msg.text }]
    });
  }

  // Add current user message
  contents.push({
    role: 'user',
    parts: [{ text: userText }]
  });

  const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent`;

  const body = {
    contents,
    systemInstruction: {
      parts: [{ text: systemPrompt + getMemoryContext() + statusContext }]
    },
    generationConfig: {
      temperature: 0.8,
      maxOutputTokens: 1024
    }
  };

  const res = await fetchWithRetry(url, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-goog-api-key': apiKey
    },
    body: JSON.stringify(body)
  });

  const data = res._parsedData || await res.json();
  const candidate = data.candidates?.[0];
  if (!candidate) throw new Error('応答がありませんでした');

  return candidate.content?.parts?.[0]?.text || '(空の応答)';
}

// --- Phase 1.5: Analyze & Save ---
let lastAnalysis = null;

async function analyzeAndSave() {
  if (chatHistory.length === 0) {
    addSystemMessage('会話がありません。まずK.I.T.T.と話してください。');
    return;
  }
  if (!apiKey) {
    openSettings();
    return;
  }

  const loading = document.getElementById('loadingOverlay');
  loading.classList.add('active');

  try {
    // Build conversation text for extraction
    const conversationText = chatHistory.map(msg => {
      const time = msg.timestamp ? formatTime(msg.timestamp) : '';
      const speaker = msg.role === 'user' ? 'You' : 'K.I.T.T.';
      return `[${time}] ${speaker}: ${msg.text}`;
    }).join('\n');

    const extractionPrompt = `以下の会話を分析して、必ずこの形式のJSONで返してください:
{"summary":"会話の要約を1行で","ideas":["アイデア1"],"tasks":["タスク1"],"schedule":["予定1"],"memories":["記憶1"]}

ルール:
- summary: 会話全体の要約（20文字以内、改行禁止）
- ideas: アイデアや思いつき（各項目15文字以内）
- tasks: やるべきこと（各項目15文字以内）
- schedule: 日時のある予定（各項目15文字以内）
- memories: ユーザーについて覚えておくべき事実（好み、状況、習慣、感情など。各項目20文字以内）
- 該当なしは空配列[]、summaryは"雑談"とする
- 各値は短く簡潔に。改行やダブルクォートを含めない

会話:
${conversationText}`;

    const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent`;
    const body = {
      contents: [{ role: 'user', parts: [{ text: extractionPrompt }] }],
      generationConfig: {
        temperature: 0.2,
        maxOutputTokens: 4096,
        responseMimeType: 'application/json',
        responseSchema: {
          type: 'OBJECT',
          properties: {
            summary: { type: 'STRING' },
            ideas: { type: 'ARRAY', items: { type: 'STRING' } },
            tasks: { type: 'ARRAY', items: { type: 'STRING' } },
            schedule: { type: 'ARRAY', items: { type: 'STRING' } },
            memories: { type: 'ARRAY', items: { type: 'STRING' } }
          },
          required: ['summary', 'ideas', 'tasks', 'schedule', 'memories']
        }
      }
    };

    const res = await fetchWithRetry(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-goog-api-key': apiKey
      },
      body: JSON.stringify(body)
    });

    const data = res._parsedData || await res.json();
    const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text || '{}';
    console.log('[KITT分析] Gemini raw response:', rawText);
    const analysis = safeParseJson(rawText);

    lastAnalysis = {
      summary: analysis.summary || '',
      ideas: analysis.ideas || [],
      tasks: analysis.tasks || [],
      schedule: analysis.schedule || [],
      memories: analysis.memories || [],
      timestamp: new Date().toISOString()
    };

    // Store extracted memories into local memory
    if (lastAnalysis.memories.length > 0) {
      lastAnalysis.memories.forEach(fact => addLocalMemory(fact));
      console.log(`[KITT記憶] ${lastAnalysis.memories.length}件の記憶を蓄積`);
    }

    // Auto-save to localStorage
    saveAnalysisLog(lastAnalysis);

    // Display results with saved message
    showResultModal(lastAnalysis, true);
  } catch (err) {
    addSystemMessage(`分析エラー: ${err.message}`);
  }

  loading.classList.remove('active');
}

function safeParseJson(rawText) {
  const attempts = [
    () => JSON.parse(rawText),
    () => JSON.parse(rawText.replace(/[\r\n]+/g, ' ')),
    () => JSON.parse(rawText.replace(/[\x00-\x1f]/g, ' ')),
  ];
  // Also try extracting JSON object from text
  const jsonMatch = rawText.match(/\{[\s\S]*\}/);
  if (jsonMatch) {
    attempts.push(
      () => JSON.parse(jsonMatch[0]),
      () => JSON.parse(jsonMatch[0].replace(/[\r\n]+/g, ' ')),
      () => JSON.parse(jsonMatch[0].replace(/[\x00-\x1f]/g, ' ')),
    );
  }
  for (const attempt of attempts) {
    try { return attempt(); } catch {}
  }
  console.error('[KITT分析] JSON parse failed. Raw:', rawText);
  return { summary: '(分析結果の解析に失敗)', ideas: [], tasks: [], schedule: [] };
}

function formatTime(isoString) {
  try {
    const d = new Date(isoString);
    return d.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
  } catch { return ''; }
}

function formatDate(isoString) {
  try {
    const d = new Date(isoString);
    return d.toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\//g, '-');
  } catch { return new Date().toISOString().slice(0, 10); }
}

// Full conversation log export
async function conversationToMarkdown(location = null) {
  if (chatHistory.length === 0) return null;

  const now = new Date();
  const id = now.toISOString().replace(/[-:T]/g, '').slice(0, 15).replace(/(\d{8})(\d{6})/, '$1_$2');

  const isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);
  const device = isMobile ? 'iphone' : 'mac';

  // First and last message timestamps
  const firstMsg = chatHistory[0];
  const lastMsg = chatHistory[chatHistory.length - 1];
  const startTime = firstMsg.timestamp ? new Date(firstMsg.timestamp).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '不明';
  const endTime = lastMsg.timestamp ? new Date(lastMsg.timestamp).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '不明';

  let md = `---\nid: ${id}\ntype: kitt_conversation\ncreated: ${created}\ndevice: ${device}\nsource: kitt\n`;
  if (location) {
    md += `location: ${location.latitude.toFixed(6)},${location.longitude.toFixed(6)}\n`;
  }
  md += `---\n\n`;

  md += `# KITT全文会話ログ - ${created.slice(0, 16)}\n\n`;

  md += `## メタデータ\n`;
  md += `- 日時: ${created.slice(0, 10)} ${startTime} 〜 ${endTime}\n`;
  md += `- デバイス: ${device}\n`;
  if (location) {
    md += `- 位置: ${location.latitude.toFixed(6)}, ${location.longitude.toFixed(6)}\n`;
  }
  md += `- メッセージ数: ${chatHistory.length}\n\n`;

  md += `## 会話\n\n`;
  chatHistory.forEach(msg => {
    const time = msg.timestamp ? formatTime(msg.timestamp) : '';
    const speaker = msg.role === 'user' ? 'You' : 'K.I.T.T.';
    const timestamp = time ? `[${time}] ` : '';
    md += `**${timestamp}${speaker}:**\n${msg.text}\n\n`;
  });

  return { md, id, created };
}

// --- Auto-save directory (Mac: File System Access API) ---
let savedDirHandle = null;

// IndexedDBにディレクトリハンドルを永続保存
async function saveDirHandle(handle) {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('kitt_export', 1);
    req.onupgradeneeded = () => req.result.createObjectStore('handles');
    req.onsuccess = () => {
      const tx = req.result.transaction('handles', 'readwrite');
      tx.objectStore('handles').put(handle, 'exportDir');
      tx.oncomplete = resolve;
    };
    req.onerror = reject;
  });
}

async function loadDirHandle() {
  return new Promise((resolve) => {
    const req = indexedDB.open('kitt_export', 1);
    req.onupgradeneeded = () => req.result.createObjectStore('handles');
    req.onsuccess = () => {
      const tx = req.result.transaction('handles', 'readonly');
      const get = tx.objectStore('handles').get('exportDir');
      get.onsuccess = () => resolve(get.result || null);
      get.onerror = () => resolve(null);
    };
    req.onerror = () => resolve(null);
  });
}

// 初期化時に保存済みハンドルを復元
(async () => {
  try {
    savedDirHandle = await loadDirHandle();
    if (savedDirHandle) console.log('[KITT] 保存先フォルダ復元済み');
  } catch {}
})();

async function pickExportFolder() {
  try {
    const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
    savedDirHandle = handle;
    await saveDirHandle(handle);
    addSystemMessage(`📂 保存先を設定しました: ${handle.name}/`);
    return true;
  } catch (e) {
    if (e.name !== 'AbortError') addSystemMessage(`フォルダ選択エラー: ${e.message}`);
    return false;
  }
}

async function writeToSavedDir(filename, content) {
  if (!savedDirHandle) return false;
  try {
    // 権限の再確認（ブラウザ再起動後に必要な場合がある）
    const perm = await savedDirHandle.queryPermission({ mode: 'readwrite' });
    if (perm !== 'granted') {
      const req = await savedDirHandle.requestPermission({ mode: 'readwrite' });
      if (req !== 'granted') return false;
    }
    const fileHandle = await savedDirHandle.getFileHandle(filename, { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(content);
    await writable.close();
    return true;
  } catch (e) {
    console.error('[KITT] 自動保存エラー:', e);
    return false;
  }
}

async function shareOrDownload(filename, content) {
  const isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);

  // Mac: File System Access API（保存先フォルダが設定済みなら自動保存）
  if (!isMobile && savedDirHandle) {
    const ok = await writeToSavedDir(filename, content);
    if (ok) {
      addSystemMessage(`✅ 自動保存: ${savedDirHandle.name}/${filename}`);
      return;
    }
    // 権限失効時はフォールバック
    addSystemMessage('⚠ 保存先への書き込みに失敗。フォルダを再設定してください。');
    savedDirHandle = null;
  }

  // Mac: 初回はフォルダ選択を促す（File System Access API対応ブラウザ）
  if (!isMobile && window.showDirectoryPicker) {
    const picked = await pickExportFolder();
    if (picked) {
      const ok = await writeToSavedDir(filename, content);
      if (ok) {
        addSystemMessage(`✅ 保存しました: ${savedDirHandle.name}/${filename}`);
        return;
      }
    }
  }

  // iPhone: Web Share API
  const file = new File([content], filename, { type: 'text/markdown' });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      addSystemMessage('📂 保存先: iCloud Drive > PersonalSecretary > 00_InfoHub > inbox');
      await navigator.share({ files: [file], title: filename });
      addSystemMessage(`共有しました: ${filename}`);
      return;
    } catch (e) {
      if (e.name === 'AbortError') return;
    }
  }

  // 最終フォールバック: ダウンロード
  const blob = new Blob([content], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
  addSystemMessage(`ダウンロード: ${filename}`);
}

function exportCurrentAnalysis() {
  if (!lastAnalysis) return;
  const { md, id } = analysisToMarkdown(lastAnalysis);
  shareOrDownload(`kitt_${id}.md`, md);
}

async function exportFullConversation() {
  if (chatHistory.length === 0) {
    addSystemMessage('会話がありません。まずK.I.T.T.と話してください。');
    return;
  }

  // Get location (optional, non-blocking)
  addSystemMessage('会話ログをエクスポートしています...');
  const location = await getCurrentLocation();

  const result = await conversationToMarkdown(location);
  if (!result) {
    addSystemMessage('エクスポートに失敗しました。');
    return;
  }

  const { md, id } = result;
  await shareOrDownload(`kitt_conversation_${id}.md`, md);

  // Record last export time for periodic prompt
  localStorage.setItem('kitt_last_export', new Date().toISOString());
}

function exportAllLogs() {
  const logs = JSON.parse(localStorage.getItem('kitt_analysis_logs') || '[]');
  if (logs.length === 0) {
    addSystemMessage('エクスポートするログがありません。');
    return;
  }
  const allMd = logs.map(log => analysisToMarkdown(log).md).join('\n---\n\n');
  const now = new Date();
  const dateStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  shareOrDownload(`kitt_all_${dateStr}.md`, allMd);
}

function clearAllLogs() {
  if (confirm('保存済みの分析ログをすべて削除しますか？')) {
    localStorage.removeItem('kitt_analysis_logs');
    closeLogList();
    addSystemMessage('分析ログを全削除しました。');
  }
}

// --- Status Board ---
const STATUS_JSON_URL = 'status_summary.json';

async function openStatusBoard() {
  document.getElementById('statusModal').classList.add('active');
  await refreshStatusBoard();
}

function closeStatusBoard() {
  document.getElementById('statusModal').classList.remove('active');
}

async function refreshStatusBoard() {
  const content = document.getElementById('statusContent');
  const updated = document.getElementById('statusUpdated');
  content.innerHTML = '<div style="text-align:center;color:#888;padding:20px;">読み込み中...</div>';

  try {
    const res = await fetch(STATUS_JSON_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('status_summary.json が見つかりません');
    const data = await res.json();

    updated.textContent = '最終更新: ' + (data.generated_at || '不明');
    content.innerHTML = renderStatusBoard(data);
  } catch (e) {
    updated.textContent = '';
    content.innerHTML = '<div class="status-error">ステータス情報を取得できません。<br>Claude Codeで generate_status_json.py を実行してpushしてください。</div>';
  }
}

function renderStatusBoard(data) {
  let html = '';

  // K.I.T.T. Health (API usage)
  const usage = getApiUsage();
  const total = usage.success + usage.rateLimit + usage.error;
  const remaining = Math.max(0, 1000 - total);
  const healthColor = remaining <= 50 ? '#ff4444' : remaining <= 200 ? '#cccc44' : '#44cc44';
  const barWidth = Math.max(2, (remaining / 1000) * 100);

  const rpm = getRpm();
  const rpmColor = rpm >= 15 ? '#ff4444' : rpm >= 12 ? '#cccc44' : '#44cc44';
  const rpmWait = getRpmWaitSec();
  const tpm = getTpm();
  const tpmK = Math.round(tpm / 1000);
  const tpmColor = tpm >= 250000 ? '#ff4444' : tpm >= 200000 ? '#cccc44' : '#44cc44';
  const totalTokensK = Math.round((usage.totalTokens || 0) / 1000);

  html += '<div class="status-section-title">K.I.T.T. System Health</div>';
  html += `<div class="status-card">
    <div class="status-card-detail" style="margin-bottom:6px;">
      <span style="color:${healthColor};">&#9679;</span> RPD: <strong style="color:${healthColor};">${remaining}</strong> / 1,000 (日次リクエスト)
    </div>
    <div style="background:#1a1a1a;height:8px;border-radius:4px;overflow:hidden;margin-bottom:6px;">
      <div style="background:${healthColor};height:100%;width:${barWidth}%;border-radius:4px;transition:width 0.3s;"></div>
    </div>
    <div class="status-card-detail" style="margin-bottom:4px;">
      <span style="color:${rpmColor};">&#9679;</span> RPM: <strong style="color:${rpmColor};">${rpm}</strong> / 15 (分あたりリクエスト)
      ${rpmWait > 0 ? `<span style="color:#cc8844;"> ⏳ 待機必要: ${rpmWait}秒</span>` : ''}
    </div>
    <div class="status-card-detail" style="margin-bottom:4px;">
      <span style="color:${tpmColor};">&#9679;</span> TPM: <strong style="color:${tpmColor};">${tpmK}k</strong> / 250k (分あたりトークン)
    </div>
    <div class="status-card-detail" style="margin-bottom:4px;">
      &#128200; 日次トークン累計: <strong>${totalTokensK}k</strong> tokens
    </div>
    <div class="status-card-detail">
      &#9989; 成功: ${usage.success} &nbsp; &#9888; 制限: ${usage.rateLimit} &nbsp; &#10060; エラー: ${usage.error}
    </div>
    <div class="status-card-detail" style="color:#666;margin-top:4px;">日付: ${usage.date || getToday()} | リセット: 太平洋時間 0:00</div>
  </div>`;

  // Projects
  const activeProjects = (data.projects || []).filter(p =>
    p.status !== '未着手' && p.details && p.details.length > 0
  );

  if (activeProjects.length > 0) {
    html += '<div class="status-section-title">プロジェクト</div>';
    activeProjects.forEach(p => {
      const badgeClass = p.status.includes('完成') || p.status.includes('done') ? 'done'
        : p.status.includes('未着手') ? 'pending' : 'active';
      html += `<div class="status-card">
        <div class="status-card-header">
          <span class="status-card-name">${escapeHtml(p.name)}</span>
          <span class="status-badge ${badgeClass}">${escapeHtml(p.status)}</span>
        </div>
        <div class="status-card-detail">${p.details.slice(0, 2).map(d =>
          escapeHtml(d.replace(/`/g, ''))
        ).join('<br>')}</div>
      </div>`;
    });
  }

  // Inbox
  html += '<div class="status-section-title">InfoHub Inbox</div>';
  if (data.inbox && data.inbox.count > 0) {
    data.inbox.items.forEach(item => {
      html += `<div class="status-inbox-item">
        <strong>${escapeHtml(item.name)}</strong> (${item.updated})
        ${item.preview ? '<br>' + escapeHtml(item.preview) : ''}
      </div>`;
    });
  } else {
    html += '<div class="status-inbox-empty">新着なし</div>';
  }

  // Latest session & next action
  if (data.latest_session) {
    html += '<div class="status-section-title">前回のセッション</div>';
    html += `<div class="status-card-detail">${escapeHtml(data.latest_session.title)}</div>`;
    if (data.latest_session.next_action) {
      html += '<div class="status-section-title">次にやること</div>';
      html += `<div class="status-next">${escapeHtml(data.latest_session.next_action)}</div>`;
    }
  }

  return html;
}
